<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// Todo</title>
    <script src="https://kit.fontawesome.com/578dda704c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn">&times;</a>
        <a href="#"><i class="fa-solid fa-house"></i> Inbox</a>
        <a href="#"><i class="fa-solid fa-list-check"></i> Projects</a>
        <a href="#"><i class="fa-solid fa-note-sticky"></i> Notes</a>
        <div class="addbtn">
            <button type="button" class="add">+</button>
        </div>
      </div>
      <div id="main">
        <span style="font-size:30px;cursor:pointer" class="open">&#9776;</span>
        <h1>// To-Do</h1>
      </div>
      <main>
         <div class="task-container"></div>
      </main>
      <div id="container">
        <span class="closeform">	&#xD7;</span>
        <h2>Create a new...</h2> 
        <div id="select">
        <a href="#">Todo</a>
        <a href="#">Project</a>
        <a href="#">Note</a>
        </div>

      <form>
        <label for="title"></label>
        <input type="text" placeholder="Title: Learn react..." class="rinput" id="title" required><br>
        <label for="details"></label>
        <textarea name="details" id="details" placeholder="Details: Watch tutorials, read documentation etc..." rows="10" cols="40"></textarea><br>
        <label for="date">Due Date:</label>
        <input type="date" id="date" class="rinput" required><br>
        <div id="priority">
        <span>Priority:  </span>
        <label for="low" class="low">Low</label>
        <input type="radio" id="low" name="priority" class="priority" required>
        <label for="medium" class="medium">Medium</label>
        <input type="radio" id="medium" name="priority" class="priority" >
        <label for="high" class="high">High</label>
        <input type="radio" id="high" name="priority" class="priority" >
        </div>
        <button type="submit" class="submit">Submit</button>

      </form>
      </div>
      <div class="overlay" id="overlay"></div>
      <script src="main.js"></script>
</body>
</html>
